name: Tests
env:
    COLUMNS: 140 # Avoid narrow or even truncated output from pytest and rich
on:
    push:
        branches:
            - master
        tags:
            - "*"
        paths-ignore:
            - "**.md"
    pull_request:
        paths-ignore:
            - "**.md"

jobs:
    ruff-pyright-pytestlinux-and-mitmproxy-recording:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - name: set up python
              uses: actions/setup-python@v6
              with:
                  python-version-file: ".python-version"

            - name: setup uv
              uses: astral-sh/setup-uv@v7

            - name: install mitmproxy
              run: |
                  sudo apt-get update
                  sudo apt-get install -y mitmproxy

            - name: generate locustfile using mitmproxy and execute recording
              run: |
                  cd ${{ runner.temp }} # dont overwrite locustfile.py in the checkout
                  mitmdump -s "$GITHUB_WORKSPACE/examples/mitmproxy_addon.py" &
                  sleep 5   
                  #   timeout 10s bash -c 'until lsof -i:8080; do sleep 1; done'
                  grep "This file was generated using mitmproxy" locustfile.py
                  curl -x http://localhost:8080 -k https://www.google.com
                  grep https://www.google.com locustfile.py
                  aiolocust -i 1 | tee locust_output.txt
                  grep https://www.google.com locust_output.txt
                  grep "0 (0.0%)" locust_output.txt

            - name: ruff lint and format
              run: |
                  uv run ruff check
                  uv run ruff format --check

            - name: pyright type check
              run: |
                  uv run pyright

            - name: pytest
              run: uv run pytest tests

    examples:
        runs-on: ubuntu-latest
        timeout-minutes: 4
        steps:
            - uses: actions/checkout@v6

            - name: Start Server
              run: |
                  cd tests/performance && nginx -p $PWD -c $PWD/nginx.conf
                  # timeout 10s sh -c 'until curl -s localhost:8080; do sleep 1; done'

            - name: set up python
              uses: actions/setup-python@v6
              with:
                  python-version-file: ".python-version"

            - name: setup uv
              uses: astral-sh/setup-uv@v7
              with:
                  enable-cache: true

            - name: Run Tests
              env:
                  OTEL_TRACES_EXPORTER: console
              run: |
                  uv run aiolocust --instrument -d 1 | tee locust_output.txt
                  grep -E '"name": "GET"' locust_output.txt
                  # advanced
                  uv run aiolocust examples/otel/instrument_aiohttpclient_span_manipulation.py -d 1 | tee locust_output.txt
                  grep '"name": "some-name"' locust_output.txt
                  grep '"foo": "bar"' locust_output.txt
                  grep 'some-value' locust_output.txt

    perftest:
        runs-on: ubuntu-latest
        timeout-minutes: 4
        steps:
            - uses: actions/checkout@v6

            - name: Start Server
              run: |
                  cd tests/performance && nginx -p $PWD -c $PWD/nginx.conf
                  # timeout 10s sh -c 'until curl -s localhost:8080; do sleep 1; done'

            - name: set up python
              uses: actions/setup-python@v6
              with:
                  python-version-file: ".python-version"

            - name: setup uv
              uses: astral-sh/setup-uv@v7
              with:
                  enable-cache: true

            - name: Run Tests
              run: |
                  uv run examples/advanced.py --users 100 --duration 30 --rate 10 --log-level debug | tee locust_output.txt
                  grep -E 'Total.*[0-9]{4}.[0-9]{2}/s' locust_output.txt # ensure >1000 RPS
                  bash -ec '! grep Traceback locust_output.txt' # ensure no callstacks
    windows:
        runs-on: windows-latest

        steps:
            - uses: actions/checkout@v6

            - name: set up python
              uses: actions/setup-python@v6
              with:
                  python-version-file: ".python-version"

            - name: setup uv
              uses: astral-sh/setup-uv@v7

            - name: pytest
              run: uv run pytest --full-trace tests

    macos:
        runs-on: macos-latest

        steps:
            - uses: actions/checkout@v6

            - name: set up python
              uses: actions/setup-python@v6
              with:
                  python-version-file: ".python-version"

            - name: setup uv
              uses: astral-sh/setup-uv@v7

            - name: pytest
              run: uv run pytest tests

    publish_pypi:
        name: Publish to PyPI
        needs:
            [ruff-pyright-pytestlinux-and-mitmproxy-recording, windows, macos]
        if: github.repository_owner == 'cyberw' && startsWith(github.event.ref, 'refs/tags')
        runs-on: ubuntu-latest

        permissions:
            id-token: write
            contents: read

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Install uv
              uses: astral-sh/setup-uv@v7

            - name: Build package
              run: |
                  uv version ${{ github.ref_name }}
                  uv build

            - name: Publish to PyPI
              run: uv publish
